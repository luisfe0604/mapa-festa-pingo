<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa de Mesas - Gerência</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <div id="toast" class="toast hidden"></div>
  <body>
    <div id="mapa-container">
      <!-- Identificações fixas no mapa -->
      <div id="mapa-identificacoes">
        <div class="identificacao som">
          <span>🎵 Som</span>
        </div>
        <div class="identificacao palco">
          <span>🎤 Palco</span>
        </div>
        <div class="identificacao salgados">
          <span>🍔 Salgados</span>
        </div>
        <div class="identificacao caixa">
          <span>💵 Caixa</span>
        </div>
        <div class="identificacao pesca">
          <span>🎣 Pesca</span>
        </div>
        <div class="identificacao bebidas">
          <span>🥤 Bebidas</span>
        </div>
        <div class="identificacao entrada">
          <span>🚪 Entrada</span>
        </div>
      </div>

      <!-- Mapa das mesas será renderizado aqui -->
      <div id="mapa"></div>
    </div>
    <button id="exportar-excel">Exportar Excel</button>

    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h2><span id="mesa-id"></span></h2>

        <label>Nome: <input type="text" id="nome" /></label><br />
        <label>Cadeiras: <input type="number" id="cadeiras" /></label><br />
        <div class="modal-buttons">
          <button id="confirmar">Salvar</button>
          <button id="limpar">Excluir reserva</button>
          <button id="cancelar">Cancelar</button>
        </div>
      </div>
    </div>

    <script>
      const isGerente = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
